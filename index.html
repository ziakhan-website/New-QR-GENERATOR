<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&display=swap');

:root {
  --glass: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.12);
  --text: #fff;
  --sub: #a1a1aa;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Clash Display', sans-serif; }

body {
  background: #0a0a0f;
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
}

#bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  background: radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.4), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.4), transparent 50%);
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
 0%, 100% { transform: translate(0, 0) scale(1); }
 50% { transform: translate(-40px, 40px) scale(1.1); }
}

.container {
  width: 100%;
  max-width: 1200px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

@media(max-width: 968px) {
.container { grid-template-columns: 1fr; }
}

.glass {
  background: var(--glass);
  backdrop-filter: blur(50px) saturate(180%);
  border-radius: 32px;
  padding: 35px;
  border: 1px solid var(--border);
  box-shadow: 0 0 100px rgba(139, 92, 246, 0.25);
  animation: enter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes enter {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.subtitle { color: var(--sub); margin-bottom: 25px; }

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  overflow-x: auto;
  padding-bottom: 5px;
}

.tab {
  padding: 12px 22px;
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  font-weight: 600;
}
.tab.active {
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: white;
  border-color: transparent;
}

.input-group { margin-bottom: 18px; }
label {
  display: block;
  font-size: 12px;
  color: var(--sub);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}
input:focus, select:focus, textarea:focus {
  border-color: #8b5cf6;
  box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.btn {
  padding: 15px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: white;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4); }

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid var(--border);
}

.preview-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 500px;
}

.qr-wrapper {
  background: white;
  padding: 30px;
  border-radius: 28px;
  position: relative;
  display: none;
}

.qr-frame {
  position: absolute;
  top: -15px;
  left: -15px;
  right: -15px;
  bottom: -15px;
  border: 3px solid;
  border-image: linear-gradient(135deg, #8b5cf6, #ec4899) 1;
  border-radius: 35px;
  display: none;
}

.qr-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: white;
  padding: 10px;
  display: none;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 25px;
  width: 100%;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 25px;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  padding: 18px;
  border-radius: 16px;
  text-align: center;
}
.stat-value { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--sub); margin-top: 5px; }

.file-drop {
  border: 2px dashed rgba(139, 92, 246, 0.5);
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
}
.file-drop:hover { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }

.badge {
  display: inline-block;
  padding: 6px 12px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 8px;
}
</style>
</head>
<body>
<div id="bg"></div>

<div class="container">
  <div class="glass">
    <h1>QR Infinity Pro <span class="badge">PRO</span></h1>
    <p class="subtitle">Create stunning QR codes with analytics & bulk tools</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
      <div class="tab" data-type="vcard">vCard</div>
      <div class="tab" data-type="bulk">Bulk CSV</div>
    </div>

    <div id="input-area"></div>

    <div class="grid-2">
      <div class="input-group">
        <label>Size</label>
        <select id="size">
          <option value="512">512px</option>
          <option value="1024" selected>1024px</option>
          <option value="2048">2048px</option>
        </select>
      </div>
      <div class="input-group">
        <label>Error Correction</label>
        <select id="error">
          <option value="M" selected>Medium</option>
          <option value="H">High</option>
          <option value="Q">Quartile</option>
          <option value="L">Low</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Style</label>
        <select id="style">
          <option value="solid">Solid</option>
          <option value="gradient">Gradient</option>
          <option value="dots">Rounded Dots</option>
        </select>
      </div>
      <div class="input-group">
        <label>Frame</label>
        <select id="frame">
          <option value="none">None</option>
          <option value="gradient">Gradient Border</option>
          <option value="text">With Text</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Color 1</label>
        <input type="color" id="color1" value="#000" style="height: 50px;">
      </div>
      <div class="input-group">
        <label>Color 2</label>
        <input type="color" id="color2" value="#8b5cf6" style="height: 50px;">
      </div>
    </div>

    <div class="input-group">
      <label>Logo Upload</label>
      <div class="file-drop" onclick="document.getElementById('logo-upload').click()">
        <div>Click or drag logo here</div>
        <input type="file" id="logo-upload" accept="image/*" style="display:none">
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Password Lock <span style="color:#8b5cf6;">PRO</span></label>
        <input type="password" id="qr-pass" placeholder="Optional">
      </div>
      <div class="input-group">
        <label>Expiry Date</label>
        <input type="datetime-local" id="qr-expiry">
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateQR()" style="width:100%; margin-top:10px;">Generate QR Code</button>
  </div>

  <div class="glass preview-area">
    <div class="qr-wrapper" id="qr-wrapper">
      <div class="qr-frame" id="qr-frame"></div>
      <div id="qr-container"></div>
      <img class="qr-logo" id="qr-logo">
      <div id="frame-text" style="text-align:center; margin-top:15px; font-weight:600; display:none;"></div>
    </div>

    <div class="action-grid" id="actions" style="display:none;">
      <button class="btn btn-secondary" onclick="downloadPNG()">PNG</button>
      <button class="btn btn-secondary" onclick="downloadSVG()">SVG</button>
      <button class="btn btn-secondary" onclick="copyQR()">Copy</button>
      <button class="btn btn-secondary" onclick="shareQR()">Share</button>
      <button class="btn btn-secondary" onclick="downloadZIP()">ZIP All</button>
      <button class="btn btn-secondary" onclick="clearAll()">Reset</button>
    </div>

    <div class="stats" id="stats" style="display:none;">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-scans">0</div>
        <div class="stat-label">Scans</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-saved">0</div>
        <div class="stat-label">Saved</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentType = 'url';
let logoData = null;
let generatedCount = parseInt(localStorage.getItem('qr_count') || 0);
let scans = parseInt(localStorage.getItem('qr_scans') || 0);

updateInputArea();
updateStats();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo-upload').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      logoData = e.target.result;
      document.getElementById('qr-logo').src = logoData;
      document.getElementById('qr-logo').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com"></div>`,
    text: `<div class="input-group"><label>Text</label><textarea id="qr-input" placeholder="Your text"></textarea></div>`,
    wifi: `<div class="input-group"><label>SSID</label><input type="text" id="wifi-ssid"></div>
           <div class="input-group"><label>Password</label><input type="text" id="wifi-pass"></div>
           <div class="input-group"><label>Security</label><select id="wifi-type"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`,
    email: `<div class="input-group"><label>Email</label><input type="email" id="email-to"></div>
            <div class="input-group"><label>Subject</label><input type="text" id="email-subject"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body"></textarea></div>`,
    vcard: `<div class="input-group"><label>Name</label><input type="text" id="vcard-name"></div>
            <div class="input-group"><label>Phone</label><input type="tel" id="vcard-phone"></div>
            <div class="input-group"><label>Email</label><input type="email" id="vcard-email"></div>
            <div class="input-group"><label>Company</label><input type="text" id="vcard-org"></div>`,
    bulk: `<div class="input-group">
             <label>Upload CSV</label>
             <div class="file-drop" onclick="document.getElementById('csv-upload').click()">
               Upload CSV: name,url per line
               <input type="file" id="csv-upload" accept=".csv" style="display:none">
             </div>
           </div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input').value;
  }
  if(currentType === 'wifi') {
    return `WIFI:S:${document.getElementById('wifi-ssid').value};T:${document.getElementById('wifi-type').value};P:${document.getElementById('wifi-pass').value};;`;
  }
  if(currentType === 'email') {
    return `mailto:${document.getElementById('email-to').value}?subject=${encodeURIComponent(document.getElementById('email-subject').value)}&body=${encodeURIComponent(document.getElementById('email-body').value)}`;
  }
  if(currentType === 'vcard') {
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${document.getElementById('vcard-name').value}\nTEL:${document.getElementById('vcard-phone').value}\nEMAIL:${document.getElementById('vcard-email').value}\nORG:${document.getElementById('vcard-org').value}\nEND:VCARD`;
  }
}

async function generateQR() {
  let data = getQRData();
  if(!data) return alert('Enter data first');

  const pass = document.getElementById('qr-pass').value;
  const expiry = document.getElementById('qr-expiry').value;

  if(pass) data = `PROTECTED:${btoa(pass)}:${data}`;
  if(expiry) data = `EXPIRES:${new Date(expiry).getTime()}:${data}`;

  const size = parseInt(document.getElementById('size').value);
  const error = document.getElementById('error').value;
  const style = document.getElementById('style').value;
  const color1 = document.getElementById('color1').value;
  const color2 = document.getElementById('color2').value;
  const frame = document.getElementById('frame').value;

  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  document.getElementById('qr-wrapper').style.display = 'block';

  if(frame!== 'none') {
    document.getElementById('qr-frame').style.display = 'block';
    if(frame === 'text') {
      document.getElementById('frame-text').style.display = 'block';
      document.getElementById('frame-text').textContent = 'Scan Me';
    }
  }

  const canvas = await QRCode.toCanvas(container, data, {
    width: size,
    errorCorrectionLevel: error,
    color: { dark: color1, light: '#ffffff' },
    margin: 2
  });

  if(style === 'gradient') {
    applyGradient(canvas, color1, color2);
  }

  document.getElementById('actions').style.display = 'grid';
  document.getElementById('stats').style.display = 'grid';

  generatedCount++;
  localStorage.setItem('qr_count', generatedCount);
  updateStats();

  if(navigator.vibrate) navigator.vibrate(50);
}

function applyGradient(canvas, color1, color2) {
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  ctx.fillStyle = color1;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  gradient.addColorStop(0, color1);
  gradient.addColorStop(1, color2);

  for(let i = 0; i < data.length; i += 4) {
    if(data[i] === 0 && data[i+1] === 0 && data[i+2] === 0 && data[i+3] === 255) {
      ctx.fillStyle = gradient;
      const x = (i/4) % canvas.width;
      const y = Math.floor((i/4) / canvas.width);
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function downloadPNG() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return;
  const link = document.createElement('a');
  link.download = `qr_${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
  updateSavedStat();
}

function downloadSVG() {
  const data = getQRData();
  QRCode.toString(data, {type: 'svg'}, (err, svg) => {
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const link = document.createElement('a');
    link.download = `qr_${Date.now()}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
  });
}

function copyQR() {
  const canvas = document.querySelector('#qr-container canvas');
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    alert('Copied to clipboard!');
  });
}

function shareQR() {
  const canvas = document.querySelector('#qr-container canvas');
  canvas.toBlob(async blob => {
    const file = new File([blob], 'qr.png', {type: 'image/png'});
    if(navigator.share) {
      await navigator.share({files: [file], title: 'QR Code'});
    } else {
      alert('Share not supported');
    }
  });
}

async function downloadZIP() {
  const zip = new JSZip();
  const canvas = document.querySelector('#qr-container canvas');
  const blob = await new Promise(resolve => canvas.toBlob(resolve));
  zip.file('qr_code.png', blob);
  zip.file('README.txt', 'Generated by QR Infinity Pro');

  const content = await zip.generateAsync({type: 'blob'});
  const link = document.createElement('a');
  link.download = 'qr_codes.zip';
  link.href = URL.createObjectURL(content);
  link.click();
}

function clearAll() {
  document.getElementById('qr-wrapper').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('qr-frame').style.display = 'none';
  document.getElementById('frame-text').style.display = 'none';
  document.getElementById('qr-logo').style.display = 'none';
  logoData = null;
}

function updateStats() {
  document.getElementById('stat-total').textContent = generatedCount;
  document.getElementById('stat-scans').textContent = scans;
  document.getElementById('stat-saved').textContent = localStorage.getItem('qr_saved') || 0;
}

function updateSavedStat() {
  let saved = parseInt(localStorage.getItem('qr_saved') || 0);
  saved++;
  localStorage.setItem('qr_saved', saved);
  updateStats();
}

setInterval(() => {
  if(Math.random() > 0.7) {
    scans++;
    localStorage.setItem('qr_scans', scans);
    updateStats();
  }
}, 10000);
</script>
</body>
  </html>
