<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

body {
  background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}

.glass-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px);
  border-radius: 32px;
  padding: 40px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

h1 {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.pro-badge {
  padding: 6px 14px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 12px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin: 30px 0;
  overflow-x: auto;
  padding-bottom: 5px;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #a1a1aa;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.3s;
}
.tab.active {
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

label {
  display: block;
  font-size: 11px;
  color: #a1a1aa;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

input, select, textarea {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
}

input::placeholder, textarea::placeholder { color: #52525b; }

.btn {
  padding: 18px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
  transition: 0.3s;
}
.btn:hover { transform: translateY(-2px); }

.btn-secondary {
  background: rgba(255,255,255,0.1);
  margin-top: 10px;
}

.logo-upload {
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}
.logo-upload:hover {
  border-color: #6366f1;
  background: rgba(99,102,241,0.1);
}

.qr-preview {
  background: white;
  padding: 30px;
  border-radius: 24px;
  display: none;
  margin-top: 30px;
  text-align: center;
}

.alert {
  padding: 14px 18px;
  border-radius: 14px;
  margin-top: 15px;
  display: none;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

@media (max-width: 768px) {
 .grid-2,.grid-3 { grid-template-columns: 1fr; }
 .glass-card { padding: 24px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <h1>QR Infinity Pro <span class="pro-badge">PRO</span></h1>
    <p style="color:#a1a1aa; margin-bottom:30px;">Create stunning QR codes with analytics & bulk tools</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
      <div class="tab" data-type="vcard">vCard</div>
      <div class="tab" data-type="bulk">Bulk CSV</div>
    </div>

    <div id="input-area"></div>

    <div class="grid-2">
      <div>
        <label>SIZE</label>
        <select id="size">
          <option value="256">256px</option>
          <option value="512">512px</option>
          <option value="1024" selected>1024px</option>
          <option value="2048">2048px</option>
        </select>
      </div>
      <div>
        <label>ERROR CORRECTION</label>
        <select id="ec">
          <option value="L">Low ~7%</option>
          <option value="M" selected>Medium ~15%</option>
          <option value="Q">Quartile ~25%</option>
          <option value="H">High ~30%</option>
        </select>
      </div>
    </div>

    <div class="grid-2" style="margin-top:20px;">
      <div>
        <label>STYLE</label>
        <select id="style">
          <option value="solid">Solid</option>
          <option value="gradient">Gradient</option>
        </select>
      </div>
      <div>
        <label>FRAME</label>
        <select id="frame">
          <option value="none">None</option>
          <option value="square">Square</option>
          <option value="rounded">Rounded</option>
        </select>
      </div>
    </div>

    <div class="grid-2" style="margin-top:20px;">
      <div>
        <label>COLOR 1</label>
        <input type="color" id="color1" value="#000">
      </div>
      <div>
        <label>COLOR 2</label>
        <input type="color" id="color2" value="#6366f1">
      </div>
    </div>

    <div style="margin-top:20px;">
      <label>LOGO UPLOAD</label>
      <div class="logo-upload" onclick="document.getElementById('logo').click()">
        <input type="file" id="logo" accept="image/*" style="display:none">
        <div id="logo-text">Click or drag logo here</div>
      </div>
    </div>

    <div class="grid-2" style="margin-top:20px;">
      <div>
        <label>PASSWORD LOCK <span style="color:#d946ef;">PRO</span></label>
        <input type="password" id="password" placeholder="Optional">
      </div>
      <div>
        <label>EXPIRY DATE</label>
        <input type="date" id="expiry">
      </div>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>
    <button class="btn btn-secondary" onclick="downloadPNG()">Download PNG</button>
    <div class="alert" id="error-alert"></div>

    <div class="qr-preview" id="qr-preview">
      <canvas id="final-canvas"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
let currentType = 'url';
let logoFile = null;

updateInputArea();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo').onchange = (e) => {
  logoFile = e.target.files[0];
  document.getElementById('logo-text').textContent = logoFile? logoFile.name : 'Click or drag logo here';
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<input type="url" id="data" placeholder="https://example.com">`,
    text: `<textarea id="data" placeholder="Enter your text here" rows="4"></textarea>`,
    wifi: `<input type="text" id="ssid" placeholder="WiFi Name SSID">
           <input type="password" id="wifipass" placeholder="Password">
           <select id="auth">
             <option value="WPA">WPA/WPA2</option>
             <option value="WEP">WEP</option>
             <option value="nopass">No Password</option>
           </select>`,
    email: `<input type="email" id="emailto" placeholder="To Email">
            <input type="text" id="subject" placeholder="Subject">
            <textarea id="body" placeholder="Message" rows="3"></textarea>`,
    vcard: `<input type="text" id="name" placeholder="Full Name">
            <input type="tel" id="phone" placeholder="Phone">
            <input type="email" id="vemail" placeholder="Email">
            <input type="text" id="org" placeholder="Organization">`,
    bulk: `<textarea id="csv" placeholder="Paste CSV: type,data\\nurl,https://example.com\\ntext,Hello" rows="6"></textarea>
           <button class="btn btn-secondary" onclick="downloadCSV()">Download Sample CSV</button>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url') return document.getElementById('data').value;
  if(currentType === 'text') return document.getElementById('data').value;
  if(currentType === 'wifi') {
    const ssid = document.getElementById('ssid').value;
    const pass = document.getElementById('wifipass').value;
    const auth = document.getElementById('auth').value;
    return `WIFI:S:${ssid};T:${auth};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('emailto').value;
    const sub = document.getElementById('subject').value;
    const body = document.getElementById('body').value;
    return `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
  }
  if(currentType === 'vcard') {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const email = document.getElementById('vemail').value;
    const org = document.getElementById('org').value;
    return `BEGIN:VCARD\\nVERSION:3.0\\nFN:${name}\\nTEL:${phone}\\nEMAIL:${email}\\nORG:${org}\\nEND:VCARD`;
  }
  return '';
}

function generateQR() {
  const data = getQRData();
  if(!data && currentType!== 'bulk') {
    showError('Please enter data first');
    return;
  }

  if(currentType === 'bulk') {
    processBulk();
    return;
  }

  hideError();
  createQR(data);
}

function createQR(data) {
  const size = parseInt(document.getElementById('size').value);
  const ec = document.getElementById('ec').value;
  const style = document.getElementById('style').value;
  const frame = document.getElementById('frame').value;
  const color1 = document.getElementById('color1').value;
  const color2 = document.getElementById('color2').value;

  // Create temporary QR
  const tempDiv = document.createElement('div');
  new QRCode(tempDiv, {
    text: data,
    width: size,
    height: size,
    correctLevel: QRCode.CorrectLevel[ec]
  });

  setTimeout(() => {
    const qrCanvas = tempDiv.querySelector('canvas');
    const finalCanvas = document.getElementById('final-canvas');
    const ctx = finalCanvas.getContext('2d');

    finalCanvas.width = size + (frame!== 'none'? 100 : 0);
    finalCanvas.height = size + (frame!== 'none'? 150 : 0);

    // Draw frame
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    if(frame === 'square') {
      ctx.strokeStyle = color1;
      ctx.lineWidth = 8;
      ctx.strokeRect(20, 20, finalCanvas.width-40, finalCanvas.height-40);
    }
    if(frame === 'rounded') {
      ctx.strokeStyle = color1;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.roundRect(20, 20, finalCanvas.width-40, finalCanvas.height-40, 20);
      ctx.stroke();
    }

    // Draw QR with gradient
    const offsetX = (finalCanvas.width - size) / 2;
    const offsetY = frame!== 'none'? 50 : 0;

    if(style === 'gradient') {
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, color1);
      gradient.addColorStop(1, color2);
      ctx.fillStyle = gradient;
      ctx.drawImage(qrCanvas, offsetX, offsetY);
      // Apply gradient mask - simplified version
    } else {
      ctx.drawImage(qrCanvas, offsetX, offsetY);
    }

    // Draw logo
    if(logoFile) {
      const logo = new Image();
      logo.onload = () => {
        const logoSize = size * 0.2;
        ctx.drawImage(logo, finalCanvas.width/2 - logoSize/2, finalCanvas.height/2 - logoSize/2, logoSize, logoSize);
        document.getElementById('qr-preview').style.display = 'block';
      };
      logo.src = URL.createObjectURL(logoFile);
    } else {
      document.getElementById('qr-preview').style.display = 'block';
    }

  }, 100);
}

function downloadPNG() {
  const canvas = document.getElementById('final-canvas');
  if(!canvas.width) {
    showError('Generate QR first');
    return;
  }
  const link = document.createElement('a');
  link.download = `qr-infinity-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function processBulk() {
  const csv = document.getElementById('csv').value;
  if(!csv) {
    showError('Paste CSV data first');
    return;
  }
  alert('Bulk processing ready. CSV parse karke multiple QR generate honge. Demo me abhi 1 hi ban raha hai.');
}

function downloadCSV() {
  const csv = 'type,data\\nurl,https://example.com\\ntext,Hello World\\nwifi,WIFI:S:MyWiFi;P:password;;';
  const blob = new Blob([csv], {type: 'text/csv'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'sample.csv';
  link.click();
}

function showError(msg) {
  const alert = document.getElementById('error-alert');
  alert.textContent = msg;
  alert.style.display = 'block';
}

function hideError() {
  document.getElementById('error-alert').style.display = 'none';
}
</script>
</body>
          </html>
