<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

:root {
  --bg-dark: #0f0f1a;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-hover: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.1);
  --text: #fff;
  --text-dim: #a1a1aa;
  --accent1: #6366f1;
  --accent2: #d946ef;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

body {
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#bg-animated {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
  background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 50%, #0f0f1a 100%);
  animation: gradientShift 15s ease infinite;
  background-size: 200% 200%;
}

@keyframes gradientShift {
 0%, 100% { background-position: 0% 50%; }
 50% { background-position: 100% 50%; }
}

#glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
  filter: blur(80px);
  z-index: -1;
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
 0%, 100% { transform: translate(0, 0) scale(1); }
 33% { transform: translate(100px, -100px) scale(1.1); }
 66% { transform: translate(-100px, 100px) scale(0.9); }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 20px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 40px;
}

@media(max-width: 1024px) {
 .container { grid-template-columns: 1fr; }
}

.glass-card {
  background: var(--glass);
  backdrop-filter: blur(40px) saturate(180%);
  border-radius: 40px;
  padding: 45px;
  border: 1px solid var(--border);
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.glass-card:hover {
  background: var(--glass-hover);
  transform: translateY(-5px);
  box-shadow: 0 30px 100px rgba(99, 102, 241, 0.3);
}

.logo-header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}
.logo-header h1 {
  font-size: 42px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.pro-badge {
  padding: 8px 16px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
}

.subtitle {
  color: var(--text-dim);
  font-size: 16px;
  margin-bottom: 35px;
}

.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 35px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 14px 26px;
  border-radius: 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  font-weight: 500;
}
.tab:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-2px);
}
.tab.active {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
  border-color: transparent;
  box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
}

.input-group { margin-bottom: 22px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 16px 18px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent1);
  background: rgba(99, 102, 241, 0.1);
  box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
}

input[type="color"] {
  height: 55px;
  padding: 8px;
  cursor: pointer;
}

.drop-zone {
  border: 2px dashed rgba(99, 102, 241, 0.4);
  border-radius: 20px;
  padding: 35px;
  text-align: center;
  cursor: pointer;
  transition: all 0.4s;
}
.drop-zone:hover {
  border-color: var(--accent1);
  background: rgba(99, 102, 241, 0.1);
  transform: scale(1.02);
}

.btn {
  padding: 18px 30px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
  width: 100%;
  margin-top: 15px;
  box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 60px rgba(99, 102, 241, 0.6);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: rgba(255,255,255,0.05);
  color: white;
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

.preview-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.qr-preview {
  background: white;
  padding: 40px;
  border-radius: 40px;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  width: 100%;
  margin-top: 20px;
}
.stat-box {
  background: rgba(255,255,255,0.03);
  padding: 25px;
  border-radius: 24px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-num {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.alert {
  padding: 16px 20px;
  border-radius: 16px;
  margin-top: 20px;
  display: none;
  animation: slideDown 0.3s;
}
.alert.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}
.alert.success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #86efac;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: none;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="bg-animated"></div>
<div id="glow"></div>

<div class="container">
  <div class="glass-card">
    <div class="logo-header">
      <h1>QR Infinity Pro</h1>
      <span class="pro-badge">PRO</span>
    </div>
    <p class="subtitle">Generate stunning QR codes with advanced customization & analytics</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
      <div class="tab" data-type="vcard">vCard</div>
      <div class="tab" data-type="bulk">Bulk CSV</div>
    </div>

    <div id="input-area"></div>

    <div class="grid-2">
      <div class="input-group">
        <label>Size</label>
        <select id="size">
          <option value="512">512px</option>
          <option value="1024" selected>1024px</option>
          <option value="2048">2048px</option>
          <option value="4096">4096px</option>
        </select>
      </div>
      <div class="input-group">
        <label>Error Correction</label>
        <select id="error">
          <option value="L">Low - 7%</option>
          <option value="M" selected>Medium - 15%</option>
          <option value="Q">Quartile - 25%</option>
          <option value="H">High - 30%</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Color 1</label>
        <input type="color" id="color1" value="#000">
      </div>
      <div class="input-group">
        <label>Color 2</label>
        <input type="color" id="color2" value="#6366f1">
      </div>
    </div>

    <div class="input-group">
      <label>Logo Upload</label>
      <div class="drop-zone" onclick="document.getElementById('logo-upload').click()">
        <div id="logo-text">Drop logo here or click to upload</div>
        <input type="file" id="logo-upload" accept="image/*" style="display:none">
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateQR()">
      <span id="btn-text">Generate QR Code</span>
      <div class="loading" id="loading"></div>
    </button>

    <div class="alert error" id="error-alert"></div>
    <div class="alert success" id="success-alert"></div>
  </div>

  <div class="glass-card preview-wrapper">
    <div class="qr-preview" id="qr-preview">
      <div id="qr-container"></div>
    </div>

    <div class="grid-2" id="actions" style="display:none; width:100%;">
      <button class="btn btn-secondary" onclick="downloadPNG()">Download PNG</button>
      <button class="btn btn-secondary" onclick="downloadSVG()">Download SVG</button>
      <button class="btn btn-secondary" onclick="copyQR()">Copy</button>
      <button class="btn btn-secondary" onclick="shareQR()">Share</button>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-generated">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-downloaded">0</div>
        <div class="stat-label">Downloaded</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-shared">0</div>
        <div class="stat-label">Shared</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
let currentType = 'url';
let logoData = null;
let stats = {
  generated: parseInt(localStorage.getItem('qr_gen') || 0),
  downloaded: parseInt(localStorage.getItem('qr_down') || 0),
  shared: parseInt(localStorage.getItem('qr_share') || 0)
};

updateStats();
updateInputArea();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo-upload').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      logoData = e.target.result;
      document.getElementById('logo-text').textContent = file.name;
      showAlert('Logo uploaded successfully!', 'success');
    };
    reader.readAsDataURL(file);
  }
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com" value="https://ziakhan-website.github.io/New-QR-GENERATOR/"></div>`,
    text: `<div class="input-group"><label>Text</label><textarea id="qr-input" placeholder="Enter your text here" rows="4"></textarea></div>`,
    wifi: `<div class="input-group"><label>Network Name (SSID)</label><input type="text" id="wifi-ssid" placeholder="MyWiFi"></div>
           <div class="input-group"><label>Password</label><input type="password" id="wifi-pass" placeholder="Password"></div>
           <div class="input-group"><label>Security Type</label><select id="wifi-type"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">No Password</option></select></div>`,
    email: `<div class="input-group"><label>To Email</label><input type="email" id="email-to" placeholder="recipient@email.com"></div>
            <div class="input-group"><label>Subject</label><input type="text" id="email-subject" placeholder="Subject line"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body" rows="3"></textarea></div>`,
    vcard: `<div class="grid-2">
              <div class="input-group"><label>Full Name</label><input type="text" id="vcard-name" placeholder="John Doe"></div>
              <div class="input-group"><label>Phone</label><input type="tel" id="vcard-phone" placeholder="+1234567890"></div>
            </div>
            <div class="grid-2">
              <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="john@email.com"></div>
              <div class="input-group"><label>Company</label><input type="text" id="vcard-org" placeholder="Company Inc"></div>
            </div>`,
    bulk: `<div class="input-group">
             <label>Upload CSV File</label>
             <div class="drop-zone" onclick="document.getElementById('csv-upload').click()">
               Upload CSV with format: name,url
               <input type="file" id="csv-upload" accept=".csv" style="display:none">
             </div>
           </div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input')?.value || '';
  }
  if(currentType === 'wifi') {
    const ssid = document.getElementById('wifi-ssid')?.value || '';
    const pass = document.getElementById('wifi-pass')?.value || '';
    const type = document.getElementById('wifi-type')?.value || 'WPA';
    return `WIFI:S:${ssid};T:${type};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('email-to')?.value || '';
    const subject = document.getElementById('email-subject')?.value || '';
    const body = document.getElementById('email-body')?.value || '';
    return `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
  if(currentType === 'vcard') {
    const name = document.getElementById('vcard-name')?.value || '';
    const phone = document.getElementById('vcard-phone')?.value || '';
    const email = document.getElementById('email')?.value || '';
    const org = document.getElementById('vcard-org')?.value || '';
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nEND:VCARD`;
  }
  return '';
}

async function generateQR() {
  try {
    hideAlerts();
    toggleLoading(true);

    if (typeof QRCode === 'undefined') {
      throw new Error('QR Library failed to load. Check internet connection.');
    }

    let data = getQRData();
    if(!data) throw new Error('Please enter data first');

    const size = parseInt(document.getElementById('size').value);
    const error = document.getElementById('error').value;
    const color1 = document.getElementById('color1').value;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-preview').style.display = 'block';

    await QRCode.toCanvas(container, data, {
      width: size,
      errorCorrectionLevel: error,
      color: { dark: color1, light: '#ffffff' },
      margin: 2
    });

    // Add logo overlay if exists
    if(logoData) {
      addLogoToQR();
    }

    document.getElementById('actions').style.display = 'grid';
    stats.generated++;
    localStorage.setItem('qr_gen', stats.generated);
    updateStats();
    showAlert('QR Code generated successfully!', 'success');

  } catch(e) {
    showAlert(e.message, 'error');
  } finally {
    toggleLoading(false);
  }
}

function addLogoToQR() {
  const canvas = document.querySelector('#qr-container canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    const size = canvas.width * 0.2;
    const x = (canvas.width - size) / 2;
    const y = (canvas.height - size) / 2;
    ctx.fillStyle = 'white';
    ctx.fillRect(x - 10, y - 10, size + 20, size + 20);
    ctx.drawImage(img, x, y, size, size);
  };
  img.src = logoData;
}

function downloadPNG() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return showAlert('Generate QR first', 'error');
  const link = document.createElement('a');
  link.download = `qr-infinity-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  stats.downloaded++;
  localStorage.setItem('qr_down', stats.downloaded);
  updateStats();
  showAlert('PNG downloaded!', 'success');
}

function downloadSVG() {
  const data = getQRData();
  if(!data) return showAlert('Generate QR first', 'error');
  QRCode.toString(data, {type: 'svg'}, (err, svg) => {
    if(err) return showAlert(err, 'error');
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const link = document.createElement('a');
    link.download = `qr-infinity-${Date.now()}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
    stats.downloaded++;
    localStorage.setItem('qr_down', stats.downloaded);
    updateStats();
    showAlert('SVG downloaded!', 'success');
  });
}

function copyQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return showAlert('Generate QR first', 'error');
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    showAlert('Copied to clipboard!', 'success');
  });
}

function shareQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return showAlert('Generate QR first', 'error');
  canvas.toBlob(async blob => {
    const file = new File([blob], 'qr-code.png', {type: 'image/png'});
    if(navigator.share) {
      await navigator.share({files: [file], title: 'QR Code', text: 'Check out this QR code'});
      stats.shared++;
      localStorage.setItem('qr_share', stats.shared);
      updateStats();
      showAlert('Shared successfully!', 'success');
    } else {
      showAlert('Share not supported on this browser', 'error');
    }
  });
}

function showAlert(msg, type) {
  hideAlerts();
  const alert = document.getElementById(type === 'error'? 'error-alert' : 'success-alert');
  alert.textContent = msg;
  alert.style.display = 'block';
  setTimeout(() => alert.style.display = 'none', 4000);
}

function hideAlerts() {
  document.getElementById('error-alert').style.display = 'none';
  document.getElementById('success-alert').style.display = 'none';
}

function toggleLoading(show) {
  document.getElementById('loading').style.display = show? 'inline-block' : 'none';
  document.getElementById('btn-text').style.display = show? 'none' : 'inline';
}

function updateStats() {
  document.getElementById('stat-generated').textContent = stats.generated;
  document.getElementById('stat-downloaded').textContent = stats.downloaded;
  document.getElementById('stat-shared').textContent = stats.shared;
}

// Mouse follower glow effect
document.addEventListener('mousemove', (e) => {
  const glow = document.getElementById('glow');
  glow.style.left = e.clientX - 300 + 'px';
  glow.style.top = e.clientY - 300 + 'px';
});
</script>
</body>
  </html>
