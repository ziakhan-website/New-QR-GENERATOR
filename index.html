<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&display=swap');
:root { --glass: rgba(255, 255, 255, 0.06); --border: rgba(255, 255, 255, 0.12); --text: #fff; --sub: #a1a1aa; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Clash Display', sans-serif; }
body { background: #0a0a0f; color: var(--text); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }
.container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
@media(max-width: 968px) { .container { grid-template-columns: 1fr; }
.glass { background: var(--glass); backdrop-filter: blur(50px); border-radius: 32px; padding: 35px; border: 1px solid var(--border); }
h1 { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #fff, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.input-group { margin: 18px 0; }
label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 8px; text-transform: uppercase; }
input, select { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; }
.btn { padding: 15px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; }
.qr-wrapper { background: white; padding: 30px; border-radius: 28px; display: none; margin-top: 20px; }
#error { color: #ff6b6b; margin-top: 15px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="glass">
    <h1>QR Infinity Pro</h1>
    
    <div class="input-group">
      <label>URL</label>
      <input type="url" id="qr-input" placeholder="https://example.com" value="https://ziakhan-website.github.io/New-QR-GENERATOR/">
    </div>

    <div class="input-group">
      <label>Size</label>
      <select id="size">
        <option value="512">512px</option>
        <option value="1024" selected>1024px</option>
      </select>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>
    <p id="error">Library load nahi hui. Refresh karo.</p>
  </div>

  <div class="glass">
    <div class="qr-wrapper" id="qr-wrapper">
      <div id="qr-container"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
async function generateQR() {
  try {
    if (typeof QRCode === 'undefined') {
      document.getElementById('error').style.display = 'block';
      return;
    }

    let data = document.getElementById('qr-input').value;
    if(!data) return alert('Enter URL first');

    const size = parseInt(document.getElementById('size').value);
    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-wrapper').style.display = 'block';

    await QRCode.toCanvas(container, data, {
      width: size,
      errorCorrectionLevel: 'M',
      color: { dark: '#000', light: '#ffffff' },
      margin: 2
    });

  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
