<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

body {
  background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 700px;
}

.glass-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px);
  border-radius: 32px;
  padding: 40px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
}

h1 {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.pro-badge {
  padding: 6px 14px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.subtitle {
  color: #a1a1aa;
  font-size: 15px;
  margin-bottom: 30px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #a1a1aa;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  font-weight: 500;
}
.tab.active {
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
  border-color: transparent;
}

.input-group { margin-bottom: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

label {
  display: block;
  font-size: 11px;
  color: #a1a1aa;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: #6366f1;
  box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
}

.drop-zone {
  border: 2px dashed rgba(99, 102, 241, 0.4);
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
}

.btn {
  padding: 18px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
  transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4); }

.qr-preview {
  background: white;
  padding: 30px;
  border-radius: 24px;
  display: none;
  margin-top: 30px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 20px;
}
.stat-box {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}
.stat-num {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 11px;
  color: #a1a1aa;
  margin-top: 6px;
  text-transform: uppercase;
}

.alert {
  padding: 14px 18px;
  border-radius: 14px;
  margin-top: 15px;
  display: none;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

.actions {
  display: none;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <h1>QR Infinity Pro <span class="pro-badge">PRO</span></h1>
    <p class="subtitle">Generate stunning QR codes with advanced customization & analytics</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
      <div class="tab" data-type="vcard">vCard</div>
      <div class="tab" data-type="bulk">Bulk CSV</div>
    </div>

    <div id="input-area"></div>

    <div class="grid-2">
      <div class="input-group">
        <label>Size</label>
        <select id="size">
          <option value="512">512px</option>
          <option value="1024" selected>1024px</option>
          <option value="2048">2048px</option>
        </select>
      </div>
      <div class="input-group">
        <label>Error Correction</label>
        <select id="error">
          <option value="L">Low - 7%</option>
          <option value="M" selected>Medium - 15%</option>
          <option value="Q">Quartile - 25%</option>
          <option value="H">High - 30%</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Color 1</label>
        <input type="color" id="color1" value="#000">
      </div>
      <div class="input-group">
        <label>Color 2</label>
        <input type="color" id="color2" value="#6366f1">
      </div>
    </div>

    <div class="input-group">
      <label>Logo Upload</label>
      <div class="drop-zone" onclick="document.getElementById('logo-upload').click()">
        <div id="logo-text">Drop logo here or click to upload</div>
        <input type="file" id="logo-upload" accept="image/*" style="display:none">
      </div>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>
    <div class="alert" id="error-alert"></div>

    <div class="qr-preview" id="qr-preview">
      <div id="qr-container"></div>
    </div>

    <div class="actions" id="actions">
      <button class="btn" onclick="downloadPNG()">Download PNG</button>
      <button class="btn" onclick="downloadSVG()">Download SVG</button>
    </div>
  </div>

  <div class="glass-card" style="margin-top: 20px;">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-generated">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-downloaded">0</div>
        <div class="stat-label">Downloaded</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-shared">0</div>
        <div class="stat-label">Shared</div>
      </div>
    </div>
  </div>
</div>

<script>
// Multi CDN fallback system
function loadScript(urls, callback) {
  let index = 0;
  function tryLoad() {
    if(index >= urls.length) {
      showError('QR Library failed to load. Check internet connection.');
      return;
    }
    const script = document.createElement('script');
    script.src = urls[index];
    script.onload = callback;
    script.onerror = () => {
      index++;
      tryLoad();
    };
    document.head.appendChild(script);
  }
  tryLoad();
}

// Load QR library with fallback
loadScript([
  'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js',
  'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'
], () => console.log('QR Library loaded'));

let currentType = 'url';
let logoData = null;
let stats = {
  generated: parseInt(localStorage.getItem('qr_gen') || 0),
  downloaded: parseInt(localStorage.getItem('qr_down') || 0),
  shared: parseInt(localStorage.getItem('qr_share') || 0)
};

updateStats();
updateInputArea();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo-upload').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      logoData = e.target.result;
      document.getElementById('logo-text').textContent = file.name;
    };
    reader.readAsDataURL(file);
  }
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com" value="https://ziakhan-website.github.io/New-QR-GENERATOR/"></div>`,
    text: `<div class="input-group"><label>TEXT</label><textarea id="qr-input" placeholder="Enter your text here" rows="4"></textarea></div>`,
    wifi: `<div class="input-group"><label>SSID</label><input type="text" id="wifi-ssid" placeholder="WiFi Name"></div>
           <div class="input-group"><label>Password</label><input type="password" id="wifi-pass"></div>
           <div class="input-group"><label>Security</label><select id="wifi-type"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`,
    email: `<div class="input-group"><label>Email</label><input type="email" id="email-to" placeholder="email@example.com"></div>
            <div class="input-group"><label>Subject</label><input type="text" id="email-subject"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body" rows="3"></textarea></div>`,
    vcard: `<div class="input-group"><label>Name</label><input type="text" id="vcard-name"></div>
            <div class="input-group"><label>Phone</label><input type="tel" id="vcard-phone"></div>
            <div class="input-group"><label>Email</label><input type="email" id="vcard-email"></div>
            <div class="input-group"><label>Company</label><input type="text" id="vcard-org"></div>`,
    bulk: `<div class="input-group">
             <label>Upload CSV</label>
             <div class="drop-zone" onclick="document.getElementById('csv-upload').click()">
               Upload CSV: name,url per line
               <input type="file" id="csv-upload" accept=".csv" style="display:none">
             </div>
           </div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input')?.value || '';
  }
  if(currentType === 'wifi') {
    const ssid = document.getElementById('wifi-ssid')?.value || '';
    const pass = document.getElementById('wifi-pass')?.value || '';
    const type = document.getElementById('wifi-type')?.value || 'WPA';
    return `WIFI:S:${ssid};T:${type};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('email-to')?.value || '';
    const subject = document.getElementById('email-subject')?.value || '';
    const body = document.getElementById('email-body')?.value || '';
    return `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
  if(currentType === 'vcard') {
    const name = document.getElementById('vcard-name')?.value || '';
    const phone = document.getElementById('vcard-phone')?.value || '';
    const email = document.getElementById('vcard-email')?.value || '';
    const org = document.getElementById('vcard-org')?.value || '';
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nEND:VCARD`;
  }
  return '';
}

async function generateQR() {
  try {
    hideError();

    if (typeof QRCode === 'undefined') {
      showError('QR Library failed to load. Check internet connection.');
      return;
    }

    let data = getQRData();
    if(!data) {
      showError('Please enter data first');
      return;
    }

    const size = parseInt(document.getElementById('size').value);
    const error = document.getElementById('error').value;
    const color1 = document.getElementById('color1').value;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-preview').style.display = 'block';

    await QRCode.toCanvas(container, data, {
      width: size,
      errorCorrectionLevel: error,
      color: { dark: color1, light: '#ffffff' },
      margin: 2
    });

    document.getElementById('actions').style.display = 'grid';
    stats.generated++;
    localStorage.setItem('qr_gen', stats.generated);
    updateStats();

  } catch(e) {
    showError('Error: ' + e.message);
  }
}

function downloadPNG() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return showError('Generate QR first');
  const link = document.createElement('a');
  link.download = `qr-infinity-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
  stats.downloaded++;
  localStorage.setItem('qr_down', stats.downloaded);
  updateStats();
}

function downloadSVG() {
  const data = getQRData();
  if(!data) return showError('Generate QR first');
  QRCode.toString(data, {type: 'svg'}, (err, svg) => {
    if(err) return showError(err);
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const link = document.createElement('a');
    link.download = `qr-infinity-${Date.now()}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
    stats.downloaded++;
    localStorage.setItem('qr_down', stats.downloaded);
    updateStats();
  });
}

function showError(msg) {
  const alert = document.getElementById('error-alert');
  alert.textContent = msg;
  alert.style.display = 'block';
}

function hideError() {
  document.getElementById('error-alert').style.display = 'none';
}

function updateStats() {
  document.getElementById('stat-generated').textContent = stats.generated;
  document.getElementById('stat-downloaded').textContent = stats.downloaded;
  document.getElementById('stat-shared').textContent = stats.shared;
}
</script>
</body>
                                                   </html>
