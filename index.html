<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body {
  background: #0f0f1a;
  color: #fff;
  padding: 20px;
  display: flex;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 600px;
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
}
h1 {
  font-size: 32px;
  margin-bottom: 30px;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
input {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  margin-bottom: 20px;
}
button {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.qr-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  margin-top: 30px;
  text-align: center;
  display: none;
}
.error {
  color: #fca5a5;
  margin-top: 15px;
  display: none;
}
</style>
</head>
<body>
<div class="container">
  <h1>QR Generator</h1>
  
  <input type="url" id="url" placeholder="Enter URL" value="https://ziakhan-website.github.io/New-QR-GENERATOR/">
  <button onclick="makeQR()">Generate QR Code</button>
  <div class="error" id="error"></div>

  <div class="qr-box" id="qr-box">
    <div id="qrcode"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
function makeQR() {
  const url = document.getElementById('url').value;
  const errorDiv = document.getElementById('error');
  const qrBox = document.getElementById('qr-box');
  const qrContainer = document.getElementById('qrcode');
  
  errorDiv.style.display = 'none';
  qrBox.style.display = 'none';
  qrContainer.innerHTML = '';
  
  if(!url) {
    errorDiv.textContent = 'Please enter a URL';
    errorDiv.style.display = 'block';
    return;
  }
  
  if(typeof QRCode === 'undefined') {
    errorDiv.textContent = 'Library load nahi hui. Page refresh karo.';
    errorDiv.style.display = 'block';
    return;
  }
  
  try {
    new QRCode(qrContainer, {
      text: url,
      width: 256,
      height: 256,
      colorDark: "#000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    
    qrBox.style.display = 'block';
  } catch(e) {
    errorDiv.textContent = 'Error: ' + e.message;
    errorDiv.style.display = 'block';
  }
}
</script>
</body>
</html>
