<script>
let currentType = 'url';
let logoData = null;
let generatedCount = parseInt(localStorage.getItem('qr_count') || 0);

updateInputArea();
updateStats();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo-upload').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      logoData = e.target.result;
    };
    reader.readAsDataURL(file);
  }
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com" value="https://ziakhan-website.github.io/New-QR-GENERATOR/"></div>`,
    text: `<div class="input-group"><label>Text</label><textarea id="qr-input" placeholder="Your text"></textarea></div>`,
    wifi: `<div class="input-group"><label>SSID</label><input type="text" id="wifi-ssid"></div>
           <div class="input-group"><label>Password</label><input type="text" id="wifi-pass"></div>
           <div class="input-group"><label>Security</label><select id="wifi-type"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`,
    email: `<div class="input-group"><label>Email</label><input type="email" id="email-to"></div>
            <div class="input-group"><label>Subject</label><input type="text" id="email-subject"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body"></textarea></div>`,
    vcard: `<div class="input-group"><label>Name</label><input type="text" id="vcard-name"></div>
            <div class="input-group"><label>Phone</label><input type="tel" id="vcard-phone"></div>
            <div class="input-group"><label>Email</label><input type="email" id="vcard-email"></div>
            <div class="input-group"><label>Company</label><input type="text" id="vcard-org"></div>`,
    bulk: `<div class="input-group">
             <label>Upload CSV</label>
             <input type="file" id="csv-upload" accept=".csv">
           </div>`
  };
  area.innerHTML = templates[currentType] || templates['url'];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input')?.value || '';
  }
  if(currentType === 'wifi') {
    const ssid = document.getElementById('wifi-ssid')?.value || '';
    const pass = document.getElementById('wifi-pass')?.value || '';
    const type = document.getElementById('wifi-type')?.value || 'WPA';
    return `WIFI:S:${ssid};T:${type};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('email-to')?.value || '';
    const subject = document.getElementById('email-subject')?.value || '';
    const body = document.getElementById('email-body')?.value || '';
    return `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }
  if(currentType === 'vcard') {
    const name = document.getElementById('vcard-name')?.value || '';
    const phone = document.getElementById('vcard-phone')?.value || '';
    const email = document.getElementById('vcard-email')?.value || '';
    const org = document.getElementById('vcard-org')?.value || '';
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nEND:VCARD`;
  }
  return '';
}

async function generateQR() {
  try {
    if (typeof QRCode === 'undefined') {
      alert('QR Library load nahi hui. Internet check karo aur refresh karo.');
      return;
    }

    let data = getQRData();
    if(!data) {
      alert('Enter data first');
      return;
    }

    const size = parseInt(document.getElementById('size')?.value || 1024);
    const error = document.getElementById('error')?.value || 'M';
    const color1 = document.getElementById('color1')?.value || '#000';

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-wrapper').style.display = 'block';

    await QRCode.toCanvas(container, data, {
      width: size,
      errorCorrectionLevel: error,
      color: { dark: color1, light: '#ffffff' },
      margin: 2
    });

    document.getElementById('actions').style.display = 'grid';
    generatedCount++;
    localStorage.setItem('qr_count', generatedCount);
    updateStats();

    if(navigator.vibrate) navigator.vibrate(50);

  } catch(e) {
    console.error(e);
    alert('Error: ' + e.message);
  }
}

function downloadPNG() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return alert('Pehle QR generate karo');
  const link = document.createElement('a');
  link.download = `qr_${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function downloadSVG() {
  const data = getQRData();
  if(!data) return alert('Pehle QR generate karo');
  QRCode.toString(data, {type: 'svg'}, (err, svg) => {
    if(err) return alert(err);
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const link = document.createElement('a');
    link.download = `qr_${Date.now()}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
  });
}

function copyQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return alert('Pehle QR generate karo');
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    alert('Copied to clipboard!');
  });
}

function shareQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return alert('Pehle QR generate karo');
  canvas.toBlob(async blob => {
    const file = new File([blob], 'qr.png', {type: 'image/png'});
    if(navigator.share) {
      await navigator.share({files: [file], title: 'QR Code'});
    } else {
      alert('Share not supported on this browser');
    }
  });
}

async function downloadZIP() {
  if(typeof JSZip === 'undefined') {
    alert('JSZip load nahi hui');
    return;
  }
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return alert('Pehle QR generate karo');

  const zip = new JSZip();
  const blob = await new Promise(resolve => canvas.toBlob(resolve));
  zip.file('qr_code.png', blob);
  zip.file('README.txt', 'Generated by QR Infinity Pro');

  const content = await zip.generateAsync({type: 'blob'});
  const link = document.createElement('a');
  link.download = 'qr_codes.zip';
  link.href = URL.createObjectURL(content);
  link.click();
}

function clearAll() {
  document.getElementById('qr-wrapper').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('qr-container').innerHTML = '';
  logoData = null;
}

function updateStats() {
  document.getElementById('stat-total').textContent = generatedCount;
}

// Remove gradient function completely - it causes CORS errors
</script>
