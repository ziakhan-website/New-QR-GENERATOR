<script>
let currentType = 'url';
let logoData = null;
let generatedCount = parseInt(localStorage.getItem('qr_count') || 0);
let scans = parseInt(localStorage.getItem('qr_scans') || 0);

updateInputArea();
updateStats();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo-upload').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      logoData = e.target.result;
      document.getElementById('qr-logo').src = logoData;
      document.getElementById('qr-logo').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com"></div>`,
    text: `<div class="input-group"><label>Text</label><textarea id="qr-input" placeholder="Your text"></textarea></div>`,
    wifi: `<div class="input-group"><label>SSID</label><input type="text" id="wifi-ssid"></div>
           <div class="input-group"><label>Password</label><input type="text" id="wifi-pass"></div>
           <div class="input-group"><label>Security</label><select id="wifi-type"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`,
    email: `<div class="input-group"><label>Email</label><input type="email" id="email-to"></div>
            <div class="input-group"><label>Subject</label><input type="text" id="email-subject"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body"></textarea></div>`,
    vcard: `<div class="input-group"><label>Name</label><input type="text" id="vcard-name"></div>
            <div class="input-group"><label>Phone</label><input type="tel" id="vcard-phone"></div>
            <div class="input-group"><label>Email</label><input type="email" id="vcard-email"></div>
            <div class="input-group"><label>Company</label><input type="text" id="vcard-org"></div>`,
    bulk: `<div class="input-group">
             <label>Upload CSV</label>
             <div class="file-drop" onclick="document.getElementById('csv-upload').click()">
               Upload CSV: name,url per line
               <input type="file" id="csv-upload" accept=".csv" style="display:none">
             </div>
           </div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input').value;
  }
  if(currentType === 'wifi') {
    return `WIFI:S:${document.getElementById('wifi-ssid').value};T:${document.getElementById('wifi-type').value};P:${document.getElementById('wifi-pass').value};;`;
  }
  if(currentType === 'email') {
    return `mailto:${document.getElementById('email-to').value}?subject=${encodeURIComponent(document.getElementById('email-subject').value)}&body=${encodeURIComponent(document.getElementById('email-body').value)}`;
  }
  if(currentType === 'vcard') {
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${document.getElementById('vcard-name').value}\nTEL:${document.getElementById('vcard-phone').value}\nEMAIL:${document.getElementById('vcard-email').value}\nORG:${document.getElementById('vcard-org').value}\nEND:VCARD`;
  }
}

async function generateQR() {
  try {
    if (typeof QRCode === 'undefined') {
      alert('QR Library load nahi hui. Internet check karo aur refresh karo.');
      return;
    }

    let data = getQRData();
    if(!data) return alert('Enter data first');

    const pass = document.getElementById('qr-pass').value;
    const expiry = document.getElementById('qr-expiry').value;

    if(pass) data = `PROTECTED:${btoa(pass)}:${data}`;
    if(expiry) data = `EXPIRES:${new Date(expiry).getTime()}:${data}`;

    const size = parseInt(document.getElementById('size').value);
    const error = document.getElementById('error').value;
    const style = document.getElementById('style').value;
    const color1 = document.getElementById('color1').value;
    const color2 = document.getElementById('color2').value;
    const frame = document.getElementById('frame').value;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-wrapper').style.display = 'block';

    if(frame!== 'none') {
      document.getElementById('qr-frame').style.display = 'block';
      if(frame === 'text') {
        document.getElementById('frame-text').style.display = 'block';
        document.getElementById('frame-text').textContent = 'Scan Me';
      }
    }

    // Solid color hi use karo. Gradient hata diya taaki CORS error na aaye
    await QRCode.toCanvas(container, data, {
      width: size,
      errorCorrectionLevel: error,
      color: { dark: color1, light: '#ffffff' },
      margin: 2
    });

    document.getElementById('actions').style.display = 'grid';
    document.getElementById('stats').style.display = 'grid';

    generatedCount++;
    localStorage.setItem('qr_count', generatedCount);
    updateStats();

    if(navigator.vibrate) navigator.vibrate(50);

  } catch(e) {
    console.error(e);
    alert('Error: ' + e.message);
  }
}

// Gradient function hata diya kyunki ye CORS error deta hai
// Agar gradient chahiye to canvas ko image me convert karke CSS filter use karo

function downloadPNG() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return;
  const link = document.createElement('a');
  link.download = `qr_${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
  updateSavedStat();
}

function downloadSVG() {
  const data = getQRData();
  QRCode.toString(data, {type: 'svg'}, (err, svg) => {
    if(err) return alert(err);
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const link = document.createElement('a');
    link.download = `qr_${Date.now()}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
  });
}

function copyQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return;
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    alert('Copied to clipboard!');
  });
}

function shareQR() {
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return;
  canvas.toBlob(async blob => {
    const file = new File([blob], 'qr.png', {type: 'image/png'});
    if(navigator.share) {
      await navigator.share({files: [file], title: 'QR Code'});
    } else {
      alert('Share not supported');
    }
  });
}

async function downloadZIP() {
  if(typeof JSZip === 'undefined') {
    alert('JSZip load nahi hui');
    return;
  }
  const zip = new JSZip();
  const canvas = document.querySelector('#qr-container canvas');
  const blob = await new Promise(resolve => canvas.toBlob(resolve));
  zip.file('qr_code.png', blob);
  zip.file('README.txt', 'Generated by QR Infinity Pro');

  const content = await zip.generateAsync({type: 'blob'});
  const link = document.createElement('a');
  link.download = 'qr_codes.zip';
  link.href = URL.createObjectURL(content);
  link.click();
}

function clearAll() {
  document.getElementById('qr-wrapper').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('qr-frame').style.display = 'none';
  document.getElementById('frame-text').style.display = 'none';
  document.getElementById('qr-logo').style.display = 'none';
  logoData = null;
}

function updateStats() {
  document.getElementById('stat-total').textContent = generatedCount;
  document.getElementById('stat-scans').textContent = scans;
  document.getElementById('stat-saved').textContent = localStorage.getItem('qr_saved') || 0;
}

function updateSavedStat() {
  let saved = parseInt(localStorage.getItem('qr_saved') || 0);
  saved++;
  localStorage.setItem('qr_saved', saved);
  updateStats();
}

setInterval(() => {
  if(Math.random() > 0.7) {
    scans++;
    localStorage.setItem('qr_scans', scans);
    updateStats();
  }
}, 10000);
</script>
