<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

body {
  background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 100%);
  color: #fff;
  min-height: 100vh;
}

.container {
  display: flex;
  min-height: 100vh;
  gap: 20px;
  padding: 20px;
}

/* Left Panel - Controls */
.sidebar {
  width: 380px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px);
  border-radius: 24px;
  padding: 30px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  height: fit-content;
}

/* Right Panel - Preview */
.preview-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.pro-badge {
  padding: 4px 12px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 8px;
}

.tabs {
  display: flex;
  gap: 8px;
  margin: 20px 0;
  overflow-x: auto;
  padding-bottom: 5px;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 10px 18px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #a1a1aa;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
}
.tab.active {
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
}

.input-group { margin-bottom: 16px; }

label {
  display: block;
  font-size: 11px;
  color: #a1a1aa;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn {
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 12px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  margin-top: 10px;
}

.logo-upload {
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
}

.qr-preview {
  background: white;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  max-width: 100%;
}

.qr-preview canvas {
  max-width: 100%;
  height: auto;
}

.alert {
  padding: 12px 16px;
  border-radius: 12px;
  margin-top: 12px;
  display: none;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
  font-size: 14px;
}

/* Mobile Responsive */
@media (max-width: 900px) {
 .container {
    flex-direction: column;
    padding: 15px;
  }

 .sidebar {
    width: 100%;
    padding: 20px;
  }

 .preview-area {
    padding: 20px 0;
  }

  h1 { font-size: 24px; }

 .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <!-- Left Sidebar -->
  <div class="sidebar">
    <h1>QR Infinity Pro <span class="pro-badge">PRO</span></h1>
    <p style="color:#a1a1aa; font-size:13px; margin-bottom:20px;">Create stunning QR codes</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
      <div class="tab" data-type="vcard">vCard</div>
      <div class="tab" data-type="bulk">Bulk CSV</div>
    </div>

    <div id="input-area"></div>

    <div class="input-group">
      <label>SIZE</label>
      <select id="size">
        <option value="512">512px</option>
        <option value="1024" selected>1024px</option>
        <option value="2048">2048px</option>
      </select>
    </div>

    <div class="input-group">
      <label>ERROR CORRECTION</label>
      <select id="ec">
        <option value="L">Low ~7%</option>
        <option value="M" selected>Medium ~15%</option>
        <option value="Q">Quartile ~25%</option>
        <option value="H">High ~30%</option>
      </select>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>STYLE</label>
        <select id="style">
          <option value="solid">Solid</option>
          <option value="gradient">Gradient</option>
        </select>
      </div>
      <div class="input-group">
        <label>FRAME</label>
        <select id="frame">
          <option value="none">None</option>
          <option value="square">Square</option>
          <option value="rounded">Rounded</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>COLOR 1</label>
        <input type="color" id="color1" value="#000">
      </div>
      <div class="input-group">
        <label>COLOR 2</label>
        <input type="color" id="color2" value="#6366f1">
      </div>
    </div>

    <div class="input-group">
      <label>LOGO UPLOAD</label>
      <div class="logo-upload" onclick="document.getElementById('logo').click()">
        <input type="file" id="logo" accept="image/*" style="display:none">
        <div id="logo-text">Tap to upload logo</div>
      </div>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>
    <button class="btn btn-secondary" onclick="downloadPNG()">Download PNG</button>
    <div class="alert" id="error-alert"></div>
  </div>

  <!-- Right Preview Area -->
  <div class="preview-area">
    <div class="qr-preview" id="qr-preview" style="display:none;">
      <canvas id="final-canvas"></canvas>
    </div>
    <div id="placeholder" style="text-align:center; color:#52525b;">
      <p style="font-size:16px;">Your QR will appear here</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
let currentType = 'url';
let logoFile = null;

updateInputArea();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

document.getElementById('logo').onchange = (e) => {
  logoFile = e.target.files[0];
  document.getElementById('logo-text').textContent = logoFile? logoFile.name : 'Tap to upload logo';
};

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><input type="url" id="data" placeholder="https://example.com"></div>`,
    text: `<div class="input-group"><textarea id="data" placeholder="Enter text" rows="3"></textarea></div>`,
    wifi: `<div class="input-group"><input type="text" id="ssid" placeholder="WiFi Name"></div>
           <div class="input-group"><input type="password" id="wifipass" placeholder="Password"></div>`,
    email: `<div class="input-group"><input type="email" id="emailto" placeholder="To Email"></div>
            <div class="input-group"><input type="text" id="subject" placeholder="Subject"></div>`,
    vcard: `<div class="input-group"><input type="text" id="name" placeholder="Full Name"></div>
            <div class="input-group"><input type="tel" id="phone" placeholder="Phone"></div>`,
    bulk: `<div class="input-group"><textarea id="csv" placeholder="Paste CSV data" rows="4"></textarea></div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url') return document.getElementById('data').value;
  if(currentType === 'text') return document.getElementById('data').value;
  if(currentType === 'wifi') {
    const ssid = document.getElementById('ssid').value;
    const pass = document.getElementById('wifipass').value;
    return `WIFI:S:${ssid};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('emailto').value;
    const sub = document.getElementById('subject').value;
    return `mailto:${to}?subject=${encodeURIComponent(sub)}`;
  }
  if(currentType === 'vcard') {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    return `BEGIN:VCARD\\nFN:${name}\\nTEL:${phone}\\nEND:VCARD`;
  }
  return '';
}

function generateQR() {
  const data = getQRData();
  if(!data) {
    showError('Please enter data first');
    return;
  }

  hideError();
  document.getElementById('placeholder').style.display = 'none';

  const size = parseInt(document.getElementById('size').value);
  const ec = document.getElementById('ec').value;
  const frame = document.getElementById('frame').value;
  const color1 = document.getElementById('color1').value;

  const tempDiv = document.createElement('div');
  new QRCode(tempDiv, {
    text: data,
    width: size,
    height: size,
    colorDark: color1,
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel[ec]
  });

  setTimeout(() => {
    const qrCanvas = tempDiv.querySelector('canvas');
    const finalCanvas = document.getElementById('final-canvas');
    const ctx = finalCanvas.getContext('2d');

    const frameSize = frame!== 'none'? 60 : 0;
    finalCanvas.width = size + frameSize;
    finalCanvas.height = size + frameSize;

    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    if(frame === 'square') {
      ctx.strokeStyle = color1;
      ctx.lineWidth = 6;
      ctx.strokeRect(15, 15, finalCanvas.width-30, finalCanvas.height-30);
    }
    if(frame === 'rounded') {
      ctx.strokeStyle = color1;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.roundRect(15, 15, finalCanvas.width-30, finalCanvas.height-30, 15);
      ctx.stroke();
    }

    const offset = frameSize / 2;
    ctx.drawImage(qrCanvas, offset, offset);

    if(logoFile) {
      const logo = new Image();
      logo.onload = () => {
        const logoSize = size * 0.18;
        ctx.drawImage(logo, finalCanvas.width/2 - logoSize/2, finalCanvas.height/2 - logoSize/2, logoSize, logoSize);
        document.getElementById('qr-preview').style.display = 'block';
      };
      logo.src = URL.createObjectURL(logoFile);
    } else {
      document.getElementById('qr-preview').style.display = 'block';
    }

  }, 100);
}

function downloadPNG() {
  const canvas = document.getElementById('final-canvas');
  if(!canvas.width) {
    showError('Generate QR first');
    return;
  }
  const link = document.createElement('a');
  link.download = `qr-${Date.now()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function showError(msg) {
  const alert = document.getElementById('error-alert');
  alert.textContent = msg;
  alert.style.display = 'block';
}

function hideError() {
  document.getElementById('error-alert').style.display = 'none';
}
</script>
</body>
      </html>
