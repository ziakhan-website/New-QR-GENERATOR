<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Infinity Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

body {
  background: linear-gradient(135deg, #0f0f1a 0%, #1e1b4b 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 700px;
}

.glass-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px);
  border-radius: 32px;
  padding: 40px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
}

h1 {
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.pro-badge {
  padding: 6px 14px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 12px;
}

.subtitle {
  color: #a1a1aa;
  font-size: 15px;
  margin-bottom: 30px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #a1a1aa;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  font-weight: 500;
}
.tab.active {
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
  border-color: transparent;
}

.input-group { margin-bottom: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

label {
  display: block;
  font-size: 11px;
  color: #a1a1aa;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  outline: none;
}

.btn {
  padding: 18px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  color: white;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4); }

.qr-preview {
  background: white;
  padding: 30px;
  border-radius: 24px;
  display: none;
  margin-top: 30px;
  text-align: center;
}

.alert {
  padding: 14px 18px;
  border-radius: 14px;
  margin-top: 15px;
  display: none;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 20px;
}
.stat-box {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}
.stat-num {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #d946ef);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <h1>QR Infinity Pro <span class="pro-badge">PRO</span></h1>
    <p class="subtitle">Generate stunning QR codes with advanced customization & analytics</p>

    <div class="tabs">
      <div class="tab active" data-type="url">URL</div>
      <div class="tab" data-type="text">Text</div>
      <div class="tab" data-type="wifi">WiFi</div>
      <div class="tab" data-type="email">Email</div>
    </div>

    <div id="input-area"></div>

    <div class="grid-2">
      <div class="input-group">
        <label>Size</label>
        <select id="size">
          <option value="512">512px</option>
          <option value="1024" selected>1024px</option>
          <option value="2048">2048px</option>
        </select>
      </div>
      <div class="input-group">
        <label>Color</label>
        <input type="color" id="color1" value="#000">
      </div>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>
    <div class="alert" id="error-alert"></div>

    <div class="qr-preview" id="qr-preview">
      <div id="qr-container"></div>
    </div>
  </div>

  <div class="glass-card" style="margin-top: 20px;">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-generated">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-downloaded">0</div>
        <div class="stat-label">Downloaded</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-shared">0</div>
        <div class="stat-label">Shared</div>
      </div>
    </div>
  </div>
</div>

<!-- Embedded QR Code Library - No CDN needed -->

// Main App Logic
let currentType = 'url';
let stats = {
  generated: parseInt(localStorage.getItem('qr_gen') || 0),
  downloaded: parseInt(localStorage.getItem('qr_down') || 0),
  shared: parseInt(localStorage.getItem('qr_share') || 0)
};

updateStats();
updateInputArea();

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    updateInputArea();
  }
});

function updateInputArea() {
  const area = document.getElementById('input-area');
  const templates = {
    url: `<div class="input-group"><label>URL</label><input type="url" id="qr-input" placeholder="https://example.com" value="https://ziakhan-website.github.io/New-QR-GENERATOR/"></div>`,
    text: `<div class="input-group"><label>TEXT</label><textarea id="qr-input" placeholder="Enter your text here" rows="4">Zia Khan</textarea></div>`,
    wifi: `<div class="input-group"><label>SSID</label><input type="text" id="wifi-ssid" placeholder="WiFi Name"></div>
           <div class="input-group"><label>Password</label><input type="password" id="wifi-pass"></div>`,
    email: `<div class="input-group"><label>Email</label><input type="email" id="email-to" placeholder="email@example.com"></div>
            <div class="input-group"><label>Message</label><textarea id="email-body" rows="3"></textarea></div>`
  };
  area.innerHTML = templates[currentType];
}

function getQRData() {
  if(currentType === 'url' || currentType === 'text') {
    return document.getElementById('qr-input')?.value || '';
  }
  if(currentType === 'wifi') {
    const ssid = document.getElementById('wifi-ssid')?.value || '';
    const pass = document.getElementById('wifi-pass')?.value || '';
    return `WIFI:S:${ssid};P:${pass};;`;
  }
  if(currentType === 'email') {
    const to = document.getElementById('email-to')?.value || '';
    const body = document.getElementById('email-body')?.value || '';
    return `mailto:${to}?body=${encodeURIComponent(body)}`;
  }
  return '';
}

function generateQR() {
  try {
    hideError();
    const data = getQRData();
    if(!data) {
      showError('Please enter data first');
      return;
    }

    const size = parseInt(document.getElementById('size').value);
    const color1 = document.getElementById('color1').value;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    document.getElementById('qr-preview').style.display = 'block';

    // Create QR Code
    const qr = new QRCode({
      text: data,
      width: size,
      height: size,
      colorDark: color1,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    container.appendChild(qr.createCanvasElement());

    stats.generated++;
    localStorage.setItem('qr_gen', stats.generated);
    updateStats();

  } catch(e) {
    showError('Error: ' + e.message);
  }
}

function showError(msg) {
  const alert = document.getElementById('error-alert');
  alert.textContent = msg;
  alert.style.display = 'block';
}

function hideError() {
  document.getElementById('error-alert').style.display = 'none';
}

function updateStats() {
  document.getElementById('stat-generated').textContent = stats.generated;
  document.getElementById('stat-downloaded').textContent = stats.downloaded;
  document.getElementById('stat-shared').textContent = stats.shared;
}
</script>
</body>
        </html>
